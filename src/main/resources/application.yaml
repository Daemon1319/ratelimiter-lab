# 1. GLOBAL SETTINGS & DEFAULTS
spring:
  application:
    name: rate-limiter-lab
  profiles:
    active: local
  jpa:
    open-in-view: false

rate-limiter:
  max-attempts: 5
  warned-threshold: 3
  window-size-seconds: 60
  cooldown-seconds: 300
  token-bucket-capacity: 5
  token-refill-rate: 0.0833

---
# 2. LOCAL PROFILE (Docker Desktop)
spring:
  config:
    activate:
      on-profile: local
      
  datasource:
    url: jdbc:postgresql://localhost:5435/ratelimiter-lab-local
    username: postgres
    password: postgres
    
  data:
    redis:
      host: localhost
      port: 6379
      
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8082

app:
  cors:
    allowed-origins: http://localhost:3000

---
# 3. PROD PROFILE (Azure + Neon + Upstash)
spring:
  config:
    activate:
      on-profile: prod
      
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    
  data:
    redis:
      url: ${REDIS_URL}
      
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: ${PORT:8082}
  shutdown: graceful
  forward-headers-strategy: NATIVE

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never